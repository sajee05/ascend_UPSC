<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#3b82f6"/>
  
  <!-- Book/Document stack icon -->
  <g transform="translate(75, 85) scale(0.7)">
    <!-- Book 1 (bottom) -->
    <rect x="50" y="270" width="360" height="60" rx="5" fill="#f0f9ff"/>
    <rect x="50" y="270" width="360" height="10" rx="3" fill="#60a5fa"/>
    
    <!-- Book 2 (middle) -->
    <rect x="70" y="210" width="360" height="60" rx="5" fill="#f0f9ff"/>
    <rect x="70" y="210" width="360" height="10" rx="3" fill="#3b82f6"/>
    
    <!-- Document/Test Paper (top) -->
    <rect x="90" y="120" width="330" height="90" rx="5" fill="#f0f9ff"/>
    
    <!-- Document lines -->
    <line x1="110" y1="140" x2="400" y2="140" stroke="#bfdbfe" stroke-width="5"/>
    <line x1="110" y1="160" x2="400" y2="160" stroke="#bfdbfe" stroke-width="5"/>
    <line x1="110" y1="180" x2="300" y2="180" stroke="#bfdbfe" stroke-width="5"/>
    
    <!-- Checkbox -->
    <rect x="110" y="195" width="20" height="20" rx="3" stroke="#3b82f6" stroke-width="2" fill="none"/>
    <path d="M115 205 L120 210 L130 198" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Arrow pointing upward -->
  <g transform="translate(256, 250) scale(0.65)">
    <path d="M0 -120 L40 -50 L15 -50 L15 120 L-15 120 L-15 -50 L-40 -50 Z" fill="#f0f9ff"/>
  </g>
  
  <!-- Text: ASCEND -->
  <text x="256" y="400" font-family="Arial, sans-serif" font-weight="bold" font-size="50" text-anchor="middle" fill="#f0f9ff">ASCEND</text>
  
  <!-- Text: UPSC -->
  <text x="256" y="450" font-family="Arial, sans-serif" font-weight="bold" font-size="60" text-anchor="middle" fill="#f0f9ff">UPSC</text>
</svg>